// ======================================================
// 2) 체크박스 최대 2개 제한
// ======================================================
function limitCheckboxes(prefix){
    const boxes = [...document.querySelectorAll(`input[id^="${prefix}"]`)];
    boxes.forEach(box => {
        box.addEventListener("change", () => {
            const checked = boxes.filter(b => b.checked);
            if(checked.length > 2){
                box.checked = false;
                alert("최대 2개까지만 선택 가능");
            }
        });
    });
}
limitCheckboxes("dps");

// ======================================================
// 3) U 점수 계산 함수
// ======================================================
function getUScore(uScore, selectedU){
    if(selectedU === "1"){
        return uScore.u1;
    }
    if(selectedU === "2~3"){
        return uScore.u1 + uScore.u2_3;
    }
    if(selectedU === "5"){
        return uScore.u5;
    }
    if(selectedU === "6"){
        return uScore.u6;
    }
    return 0;
}

function getFilterUScore(uScore, selectedU){
    if(selectedU === "1"){
        return uScore.u1;
    }
    if(selectedU === "2~3"){
        return uScore.u2_3;
    }
    if(selectedU === "5"){
        return uScore.u5;
    }
    if(selectedU === "6"){
        return uScore.u6;
    }
    return 0;
}

// ======================================================
// 3-1) 디지몬 고유 성향 판별용
// ======================================================
const traitLabels = {
    invest: {
        high: "고투자형",
        mid: "가성비형",
        low: "저자본형"
    },
    dps: {
        high: "딜 강점",
        mid: "딜 무난",
        low: "딜 부담 적음"
    },
    hunt: {
        high: "광역사냥 강점",
        mid: "사냥 무난"
    },
    dungeon: {
        high: "상위컨텐츠 강세",
        mid: "솔로던 강세",
        low: "주던 무난"
    }
};

// ======================================================
// 3-2) U 이유 문구
// ======================================================
function getUReasonLabel(name, data, selectedU){
    if(selectedU === "1"){
        const score = data.uScore.u1;

        if(score >= 5) return "1U 메인급";
        if(score >= 4) return "1U 주력 가능";
        if(score >= 3) return "1U 무난";
        return "1U 약세";
    }

    if(selectedU === "2~3"){
        const score = data.uScore.u1 + data.uScore.u2_3;

        if(score >= 6) return "2~3U 메인급";
        if(score >= 4) return "2~3U 서브급";
        if(score >= 2) return "2~3U 파츠";
        return "2~3U 저점";
    }

    if(selectedU === "5"){
        const score = data.uScore.u5;

        if(score >= 5) return "5U 핵심축";
        if(score >= 4) return "5U 실전형";
        if(score >= 3) return "5U 파츠";
        return "5U 저점";
    }

    if(selectedU === "6"){
        const score = data.uScore.u6;

        if(score >= 5) return "6U 핵심축";
        if(score >= 4) return "6U 빌드업형";
        if(score >= 3) return "6U 파츠";
        return "6U 저점";
    }

    return "현재 조건 적합";
}
// ======================================================
// 3-3) 투자 성향
// ======================================================
function getInvestTrait(data){
    const s = data.scores;
    const maxInvest = Math.max(s.invest1, s.invest2, s.invest3);

    if (s.invest1 === s.invest2 && s.invest2 === s.invest3) {
        return { label: "밸런스형", score: s.invest1 };
    }

    if (s.invest1 === s.invest2 && s.invest1 > s.invest3) {
        return { label: "밸런스형", score: s.invest1 };
    }

    if (s.invest1 === maxInvest && s.invest1 > s.invest2 && s.invest1 > s.invest3) {
        return { label: traitLabels.invest.high, score: s.invest1 };
    }

    if (s.invest3 === maxInvest && s.invest3 >= s.invest2) {
        return { label: traitLabels.invest.low, score: s.invest3 };
    }

    if (s.invest2 === maxInvest) {
        const hasDistinctEdge =
            s.hunt1 >= 8 || s.dun2 >= 8 || s.dun3 >= 8;

        if (hasDistinctEdge) {
            return { label: "밸런스형", score: s.invest2 };
        }

        return { label: traitLabels.invest.mid, score: s.invest2 };
    }

    if (maxInvest === s.invest1) return { label: traitLabels.invest.high, score: s.invest1 };
    if (maxInvest === s.invest2) return { label: traitLabels.invest.mid, score: s.invest2 };
    return { label: traitLabels.invest.low, score: s.invest3 };
}

// ======================================================
// 3-4) 딜 성향
// ======================================================
function getDpsTrait(data, name){
    const s = data.scores;

    if (name === "머시풀") {
        return { label: "딜 무난", score: s.dps2 };
    }

    if (s.dps1 >= 8 && s.dps1 > s.dps2) {
        return { label: "딜 강점", score: s.dps1 };
    }
    if (s.dps2 >= 8) {
        return { label: "딜 무난", score: s.dps2 };
    }
    if (s.dps3 >= 8) {
        return { label: "딜 부담 적음", score: s.dps3 };
    }

    return { label: "", score: 0 };
}

// ======================================================
// 3-5) 사냥 성향
// ======================================================
function getHuntTrait(data){
    const s = data.scores;

    if (s.hunt1 >= 8) return { label: "광역사냥 강점", score: s.hunt1 };
    if (s.hunt2 >= 4) return { label: "사냥 무난", score: s.hunt2 };

    return { label: "", score: 0 };
}

// ======================================================
// 3-6) 던전 성향
// ======================================================
function getDungeonTrait(data){
    const s = data.scores;

    if (s.dun2 >= 10) {
        return { label: "상위컨텐츠 강세", score: s.dun2 };
    }
    if (s.dun2 >= 8) {
        return { label: "상위컨텐츠 무난", score: s.dun2 };
    }

    return { label: "", score: 0 };
}

// ======================================================
// 3-7) 이유 3개 뽑기
// ======================================================
function buildReasons(name, data, selectedU, investKey, selectedKeys){
    const investTrait = getInvestTrait(data);
    const dpsTrait = getDpsTrait(data, name);
    const huntTrait = getHuntTrait(data);
    const dungeonTrait = getDungeonTrait(data);

    const reasons = [];
    const used = new Set();

    // 1. U 이유는 무조건 먼저
    const uLabel = getUReasonLabel(name, data, selectedU);
    if (uLabel && !used.has(uLabel)) {
        reasons.push(uLabel);
        used.add(uLabel);
    }

    // 2. 투자 성향
    if (investTrait.label && !used.has(investTrait.label)) {
        reasons.push(investTrait.label);
        used.add(investTrait.label);
    }

    // 3. 딜 성향
    if (dpsTrait.label && !used.has(dpsTrait.label)) {
        reasons.push(dpsTrait.label);
        used.add(dpsTrait.label);
    }

    // 4. 남는 자리는 사냥/던전 중 점수 높은 쪽
    const extraCandidates = [];

    if (huntTrait.score > 0 && huntTrait.label) {
        extraCandidates.push({
            label: huntTrait.label,
            score: huntTrait.score + (huntTrait.label === "광역사냥 강점" ? 1 : 0)
        });
    }

    if (dungeonTrait.score > 0 && dungeonTrait.label) {
        extraCandidates.push({
            label: dungeonTrait.label,
            score: dungeonTrait.score + (
                dungeonTrait.label === "상위컨텐츠 강세" || dungeonTrait.label === "상위컨텐츠 무난" ? 1 : 0
            )
        });
    }

    extraCandidates.sort((a, b) => b.score - a.score);

    for (const item of extraCandidates) {
        if (used.has(item.label)) continue;
        reasons.push(item.label);
        used.add(item.label);
        if (reasons.length === 3) break;
    }

    return reasons;
}
// ======================================================
// 4) 계산
// ======================================================
function calc(){
    const selectedU = document.querySelector('input[name="u"]:checked');
    if(!selectedU){
        alert("몇 U 할 건지 선택하세요.");
        return;
    }

    const selectedInvest = document.querySelector('input[name="invest"]:checked');
    if(!selectedInvest){
        alert("투자 성향 선택하세요.");
        return;
    }

    const u = selectedU.value;
    const investKey = selectedInvest.value;

    const selectedKeys = [];
    ["dps1","dps2","dps3","hunt1","hunt2","hunt3","dun1","dun2","dun3"].forEach(id => {
        if(document.getElementById(id).checked){
            selectedKeys.push(id);
        }
    });

    const results = [];

    for(const [name, data] of Object.entries(digimons)){
    // ======================================================
    // 선택한 U에서 점수 0이면 후보 제외
    // ======================================================
        const filterUScore = getFilterUScore(data.uScore, u);
if(filterUScore <= 0){
            continue;
        }

        const currentUScore = getUScore(data.uScore, u);

        let total = 0;

        total += currentUScore;
        total += data.scores[investKey] || 0;

        for(const key of selectedKeys){
            total += data.scores[key] || 0;
        }

        const reasons = buildReasons(name, data, u, investKey, selectedKeys);

        results.push({
            name,
            score: total,
            base1UScore: data.uScore.u1,
            valueTag: data.valueTag || "",
            reasons: reasons,
            reasonKey: reasons.join(" · ")
        });
    }

    results.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.base1UScore !== a.base1UScore) return b.base1UScore - a.base1UScore;
        if (a.reasonKey !== b.reasonKey) return a.reasonKey.localeCompare(b.reasonKey, "ko");
        if (a.valueTag !== b.valueTag) return a.valueTag.localeCompare(b.valueTag, "ko");
        return a.name.localeCompare(b.name, "ko");
    });

    const groupedMap = new Map();

    for (const item of results) {
        const groupKey = `${item.score}__${item.reasonKey}__${item.valueTag}`;

        if (!groupedMap.has(groupKey)) {
            groupedMap.set(groupKey, {
                score: item.score,
                names: [item.name],
                reasons: item.reasons,
                reasonKey: item.reasonKey,
                valueTag: item.valueTag,
                base1UScore: item.base1UScore
            });
        } else {
            groupedMap.get(groupKey).names.push(item.name);
        }
    }

    const groupedResults = Array.from(groupedMap.values());

    groupedResults.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.base1UScore !== a.base1UScore) return b.base1UScore - a.base1UScore;
        if (a.valueTag !== b.valueTag) return a.valueTag.localeCompare(b.valueTag, "ko");
        return a.names[0].localeCompare(b.names[0], "ko");
    });

    let output = `추천 TOP 5\n\n`;

    let currentRank = 0;
    let prevScore = null;

    for (let i = 0; i < groupedResults.length; i++) {
        const item = groupedResults[i];

        if (prevScore === null || item.score !== prevScore) {
            currentRank++;
        }

        if (currentRank > 5) break;

        const isSame = i > 0 && groupedResults[i - 1].score === item.score;
        const rankText = isSame ? `${currentRank}위(공동)` : `${currentRank}위`;

        output += `${rankText} : ${item.names.join(", ")} (${item.score}점)\n`;
        output += `└ ${item.valueTag} · ${item.reasons.join(" · ")}\n\n`;

        prevScore = item.score;
    }

    document.getElementById("result").innerText = output;
}
</script>

</html>
